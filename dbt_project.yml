name: vfx_goncalo

profile: vfx_goncalo

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  vfx_goncalo:
    usd_to_gbp_rate:
      +column_types:
        date: date

models:
  vfx_goncalo:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
    master:
      +materialized: table
      +schema: master
